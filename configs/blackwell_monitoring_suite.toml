[app]
name = "Blackwell Monitoring Suite"
version = "0.4.0"

[paths]
app_root = "src/blackwell_monitoring_suite"
asset_root = "../../assets/_external"

[assets]
default_asset_id = "blackwell_rig_gb203"

[assets.entries.noctua_nh_d9_tr5_sp6]
label = "Noctua NH-D9 TR5-SP6"
path = "usd/cpu_fan/cpu_fan.usd"
kind = "usd_stage"

[assets.entries.blackwell_rig_gb203]
label = "Blackwell Rig GB203"
path = "usd/Blackwell_Rig_server_assembly.usd"
kind = "usd_stage"

[motion]
enabled = true

[chassis_presentation]
# Authored only in BMS's session layer: the Houdini/USD master stays complete.
# Keep the initial runtime view open for engineering review, but expose each
# enclosure group separately so screenshots can switch between cutaway and
# closed presentation without editing authored USD.
open_chassis = false
cover_paths = []

[chassis_presentation.visibility_groups.top_cover]
label = "Top cover"
default_visible = false
paths = [
  "/blackwell_rig/chassis/geo/render/chassis/top",
  "/blackwell_rig/chassis/geo/proxy/chassis/top",
]

[chassis_presentation.visibility_groups.left_side_panel]
label = "Left side"
default_visible = false
paths = [
  "/blackwell_rig/chassis/geo/render/chassis/side/left_side_plate",
  "/blackwell_rig/chassis/geo/proxy/chassis/side/left_side_plate",
]

[chassis_presentation.visibility_groups.left_mounting_ear]
label = "Left ear"
default_visible = false
paths = [
  "/blackwell_rig/chassis/geo/render/chassis/side/left_side_ear",
  "/blackwell_rig/chassis/geo/proxy/chassis/side/left_side_ear",
]

[chassis_presentation.visibility_groups.right_side_panel]
label = "Right side"
default_visible = false
paths = [
  "/blackwell_rig/chassis/geo/render/chassis/side/right_side_plate",
  "/blackwell_rig/chassis/geo/proxy/chassis/side/right_side_plate",
]

[chassis_presentation.visibility_groups.right_mounting_ear]
label = "Right ear"
default_visible = false
paths = [
  "/blackwell_rig/chassis/geo/render/chassis/side/right_side_ear",
  "/blackwell_rig/chassis/geo/proxy/chassis/side/right_side_ear",
]

[chassis_presentation.face_panel]
enabled = true
label = "Front panel"
target_path = "/blackwell_rig/chassis/geo/render/chassis/face_panel"
rotation_axis = "X"
closed_angle_degrees = 0.0
open_angle_degrees = 90.0
animation_duration_seconds = 1.0
default_open = false

[chassis_presentation.qled_display]
enabled = true
metric_id = "cpu_temp_c"
warning_threshold_c = 100.0
minimum_value = 0
maximum_value = 99
normal_emission_color = [0.9, 0.96, 1.0]
warning_emission_color = [1.0, 0.32, 0.04]
off_color = [0.015, 0.018, 0.022]
emission_intensity = 1.0

[chassis_presentation.qled_display.digits.tens]
a = "/blackwell_rig/motherboard/geo/render/ws_wrx90e/pcb/digit_tens_seg_a/digit_tens_seg_a"
b = "/blackwell_rig/motherboard/geo/render/ws_wrx90e/pcb/digit_tens_seg_b/digit_tens_seg_b"
c = "/blackwell_rig/motherboard/geo/render/ws_wrx90e/pcb/digit_tens_seg_c/digit_tens_seg_c"
d = "/blackwell_rig/motherboard/geo/render/ws_wrx90e/pcb/digit_tens_seg_d/digit_tens_seg_d"
e = "/blackwell_rig/motherboard/geo/render/ws_wrx90e/pcb/digit_tens_seg_e/digit_tens_seg_e"
f = "/blackwell_rig/motherboard/geo/render/ws_wrx90e/pcb/digit_tens_seg_f/digit_tens_seg_f"
g = "/blackwell_rig/motherboard/geo/render/ws_wrx90e/pcb/digit_tens_seg_g/digit_tens_seg_g"

[chassis_presentation.qled_display.digits.units]
a = "/blackwell_rig/motherboard/geo/render/ws_wrx90e/pcb/digit_units_seg_a/digit_units_seg_a"
b = "/blackwell_rig/motherboard/geo/render/ws_wrx90e/pcb/digit_units_seg_b/digit_units_seg_b"
c = "/blackwell_rig/motherboard/geo/render/ws_wrx90e/pcb/digit_units_seg_c/digit_units_seg_c"
d = "/blackwell_rig/motherboard/geo/render/ws_wrx90e/pcb/digit_units_seg_d/digit_units_seg_d"
e = "/blackwell_rig/motherboard/geo/render/ws_wrx90e/pcb/digit_units_seg_e/digit_units_seg_e"
f = "/blackwell_rig/motherboard/geo/render/ws_wrx90e/pcb/digit_units_seg_f/digit_units_seg_f"
g = "/blackwell_rig/motherboard/geo/render/ws_wrx90e/pcb/digit_units_seg_g/digit_units_seg_g"

[chassis_presentation.front_panel_indicators]
enabled = true
power_path = "/blackwell_rig/chassis/geo/render/chassis/power_panel/Power_BTN_Light/Power_BTN_Light"
hdd_path = "/blackwell_rig/chassis/geo/render/chassis/power_panel/Light_HDD/Light_HDD"
lan_01_path = "/blackwell_rig/chassis/geo/render/chassis/power_panel/Light_LAN01/Light_LAN01"
lan_02_path = "/blackwell_rig/chassis/geo/render/chassis/power_panel/Light_LAN02/Light_LAN02"
power_color = [0.95, 0.98, 1.0]
hdd_color = [0.95, 0.98, 1.0]
lan_01_color = [0.95, 0.98, 1.0]
lan_02_color = [0.95, 0.98, 1.0]
off_color = [0.62, 0.65, 0.68]
emission_intensity = 1.0
storage_metric_id = "storage_activity_percent"
lan_01_metric_id = "lan_1_activity_percent"
lan_02_metric_id = "lan_2_activity_percent"

[[motion.fan_bindings]]
id = "cpu_cooler"
label = "CPU cooler fan"
mesh_path = "/blackwell_rig/cpu_cooler/geo/render/cpu_cooler/cpu_fan/blades/blades"
rotation_target_path = "/blackwell_rig/cpu_cooler/geo/render/cpu_cooler/cpu_fan/blades"
rotation_axis = "Z"
pivot_mode = "authored_origin"
metric_id = "cpu_fan_rpm"

[[motion.fan_bindings]]
id = "gpu_01_blower"
label = "GPU 1 blower"
mesh_path = "/blackwell_rig/compute/gpu_01/geo/render/RTX4500/blower/blower_blades/blower_blades"
rotation_target_path = "/blackwell_rig/compute/gpu_01/geo/render/RTX4500/blower"
rotation_axis = "X"
pivot_mode = "authored_origin"
metric_id = "gpu_1_fan_rpm"

[[motion.fan_bindings]]
id = "gpu_02_blower"
label = "GPU 2 blower"
mesh_path = "/blackwell_rig/compute/gpu_02/geo/render/RTX4500/blower/blower_blades/blower_blades"
rotation_target_path = "/blackwell_rig/compute/gpu_02/geo/render/RTX4500/blower"
rotation_axis = "X"
pivot_mode = "authored_origin"
metric_id = "gpu_2_fan_rpm"

[[motion.fan_bindings]]
id = "gpu_03_blower"
label = "GPU 3 blower"
mesh_path = "/blackwell_rig/compute/gpu_03/geo/render/RTX4500/blower/blower_blades/blower_blades"
rotation_target_path = "/blackwell_rig/compute/gpu_03/geo/render/RTX4500/blower"
rotation_axis = "X"
pivot_mode = "authored_origin"
metric_id = "gpu_3_fan_rpm"

[[motion.fan_bindings]]
id = "psu_fan"
label = "PSU fan"
mesh_path = "/blackwell_rig/power/psu/geo/render/psu/cooling/blades/blades"
rotation_target_path = "/blackwell_rig/power/psu/geo/render/psu/cooling/blades"
rotation_axis = "X"
pivot_mode = "authored_origin"
metric_id = "psu_load_percent"
telemetry_min_rpm = 0.0
telemetry_max_rpm = 100.0

[[motion.fan_bindings]]
id = "motherboard_nvme_fan"
label = "Motherboard NVMe fan"
mesh_path = "/blackwell_rig/motherboard/geo/render/ws_wrx90e/nvme_b/nvme_fan/nvme_fan"
rotation_target_path = "/blackwell_rig/motherboard/geo/render/ws_wrx90e/nvme_b/nvme_fan"
rotation_axis = "Y"
pivot_mode = "authored_origin"
metric_id = "cpu_fan_rpm"

[[motion.fan_bindings]]
id = "front_p120_01"
label = "Front P120 fan 1"
mesh_path = "/blackwell_rig/fans/p120_01/geo/render/bionix_p120/blades/blades"
rotation_target_path = "/blackwell_rig/fans/p120_01/geo/render/bionix_p120/blades"
rotation_axis = "Z"
pivot_mode = "authored_origin"
metric_id = "front_fan_1_rpm"

[[motion.fan_bindings]]
id = "front_p120_02"
label = "Front P120 fan 2"
mesh_path = "/blackwell_rig/fans/p120_02/geo/render/bionix_p120/blades/blades"
rotation_target_path = "/blackwell_rig/fans/p120_02/geo/render/bionix_p120/blades"
rotation_axis = "Z"
pivot_mode = "authored_origin"
metric_id = "front_fan_2_rpm"

[[motion.fan_bindings]]
id = "front_p120_03"
label = "Front P120 fan 3"
mesh_path = "/blackwell_rig/fans/p120_03/geo/render/bionix_p120/blades/blades"
rotation_target_path = "/blackwell_rig/fans/p120_03/geo/render/bionix_p120/blades"
rotation_axis = "Z"
pivot_mode = "authored_origin"
metric_id = "front_fan_3_rpm"

[[motion.fan_bindings]]
id = "rear_p8_01"
label = "Rear P8 fan 1"
mesh_path = "/blackwell_rig/fans/p8_01/geo/render/p8_max/p8_max_blades/p8_max_blades"
rotation_target_path = "/blackwell_rig/fans/p8_01/geo/render/p8_max/p8_max_blades"
rotation_axis = "Z"
pivot_mode = "authored_origin"
metric_id = "rear_fan_1_rpm"

[[motion.fan_bindings]]
id = "rear_p8_02"
label = "Rear P8 fan 2"
mesh_path = "/blackwell_rig/fans/p8_02/geo/render/p8_max/p8_max_blades/p8_max_blades"
rotation_target_path = "/blackwell_rig/fans/p8_02/geo/render/p8_max/p8_max_blades"
rotation_axis = "Z"
pivot_mode = "authored_origin"
metric_id = "rear_fan_2_rpm"

[lighting]
default_hdri_path = "hdri/kloofendal_48d_partly_cloudy_puresky_4k.exr"
exposure = 0.0
intensity = 500.0
show_hdri_background = true
review_key_light_enabled = true
review_key_light_intensity = 1200.0

[lighting.rotation]
x = 0.0
y = 0.0
z = 0.0

[simulation_cache]
enabled = true
wrapper_path = "usd/server_airflow_v001/server_airflow_load_50.usda"
root_prim_path = "/sim"
volume_prim_path = "/sim/server_airflow_load_50"
field_name = "density"
sampling_distance = 0.012
resolution_scale = 25
rendering_samples = 1
